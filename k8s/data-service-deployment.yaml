# ─────────────────────────────────────────────────────────────────────────────
# SwasthGuru Data Service — GCP Kubernetes Deployment
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: swasthguru
  labels:
    app: data-service
    component: data
spec:
  replicas: 3
  selector:
    matchLabels:
      app: data-service
  template:
    metadata:
      labels:
        app: data-service
    spec:
      containers:
        - name: data-service
          image: gcr.io/PROJECT_ID/data-service:latest
          ports:
            - containerPort: 5003
          env:
            - name: PORT
              value: "5003"
            - name: NODE_ENV
              value: production
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: swasthguru-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: swasthguru-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "750m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: data-service
  namespace: swasthguru
spec:
  selector:
    app: data-service
  ports:
    - port: 5003
      targetPort: 5003
