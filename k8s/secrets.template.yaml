# ─────────────────────────────────────────────────────────────────────────────
# SwasthGuru — Kubernetes Secrets Template
# Copy this file and fill in your actual values, then apply with:
#   kubectl apply -f k8s/secrets.yaml
#
# NEVER commit the filled-in version to git!
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: swasthguru-secrets
  namespace: swasthguru
type: Opaque
stringData:
  SUPABASE_URL: "https://YOUR-PROJECT.supabase.co"
  SUPABASE_SERVICE_ROLE_KEY: "YOUR-SUPABASE-SERVICE-ROLE-KEY"
  CLERK_SECRET_KEY: "sk_live_YOUR-CLERK-SECRET-KEY"
  CLERK_WEBHOOK_SECRET: "whsec_YOUR-WEBHOOK-SECRET"
  GEMINI_API_KEY: "YOUR-GEMINI-API-KEY"
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_live_YOUR-PUBLISHABLE-KEY"
  # Optional TURN server credentials
  TURN_SERVER_URL: "turn:your-turn-server.com:3478"
  TURN_USERNAME: "your-turn-username"
  TURN_CREDENTIAL: "your-turn-credential"
---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: swasthguru-config
  namespace: swasthguru
data:
  FRONTEND_URL: "https://swasthguru.your-domain.com"
  NODE_ENV: "production"
