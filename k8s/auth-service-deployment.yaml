# ─────────────────────────────────────────────────────────────────────────────
# SwasthGuru Auth Service — GCP Kubernetes Deployment
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: swasthguru
  labels:
    app: auth-service
    component: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: gcr.io/PROJECT_ID/auth-service:latest
          ports:
            - containerPort: 5002
          env:
            - name: PORT
              value: "5002"
            - name: NODE_ENV
              value: production
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: swasthguru-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: swasthguru-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: swasthguru-secrets
                  key: CLERK_SECRET_KEY
            - name: CLERK_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: swasthguru-secrets
                  key: CLERK_WEBHOOK_SECRET
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: swasthguru
spec:
  selector:
    app: auth-service
  ports:
    - port: 5002
      targetPort: 5002
