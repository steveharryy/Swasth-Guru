version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swasth-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_GEMINI_API_KEY=${NEXT_PUBLIC_GEMINI_API_KEY}
    env_file:
      - .env.local
    depends_on:
      - backend
    networks:
      - swasth-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swasth-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/swasth-guru
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    env_file:
      - backend/.env
    depends_on:
      - mongodb
    networks:
      - swasth-network

  mongodb:
    image: mongo:latest
    container_name: swasth-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - swasth-network

  core-engine:
    build:
      context: ./core-engine
      dockerfile: Dockerfile
    container_name: swasth-core-engine
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${NEXT_PUBLIC_GEMINI_API_KEY}
    env_file:
      - core-engine/.env
    networks:
      - swasth-network

networks:

  swasth-network:
    driver: bridge

volumes:
  mongo-data:
