version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# SwasthGuru Cloud-Native Microservices Stack
# Services:
#   frontend     → Next.js app             (port 3000)
#   backend      → API Gateway / monolith  (port 5000) [local dev convenience]
#   auth-service → User auth & sync        (port 5002)
#   data-service → Appointments, records   (port 5003)
#   signal-svc   → WebRTC signalling       (port 5001)
#   core-engine  → FastAPI GenAI engine    (port 8000)
#   redis        → Session/rate-limit store (port 6379)
#   mongodb      → Legacy local DB         (port 27017)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swasth-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
      - NEXT_PUBLIC_SIGNAL_URL=http://signal-service:5001
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_GEMINI_API_KEY=${NEXT_PUBLIC_GEMINI_API_KEY}
    env_file:
      - .env.local
    depends_on:
      - backend
      - signal-service
    networks:
      - swasth-network
    restart: unless-stopped

  # ── API Gateway / Monolith (local dev convenience) ───────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swasth-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - SERVICE_NAME=swasthguru-backend
      - MONGO_URI=mongodb://mongodb:27017/swasth-guru
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_ISSUER=${CLERK_ISSUER}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3000
    env_file:
      - backend/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - swasth-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Auth Microservice ────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: swasth-auth-service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - NODE_ENV=production
      - SERVICE_NAME=swasthguru-auth-service
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}
      - CORS_ORIGIN=http://localhost:3000
    env_file:
      - backend/.env
    networks:
      - swasth-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Data Microservice ────────────────────────────────────────────────────────
  data-service:
    build:
      context: ./services/data-service
      dockerfile: Dockerfile
    container_name: swasth-data-service
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - NODE_ENV=production
      - SERVICE_NAME=swasthguru-data-service
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CORS_ORIGIN=http://localhost:3000
    env_file:
      - backend/.env
    networks:
      - swasth-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Signal Microservice (WebRTC + Socket.IO) ─────────────────────────────────
  signal-service:
    build:
      context: ./services/signal-service
      dockerfile: Dockerfile
    container_name: swasth-signal-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - NODE_ENV=production
      - SERVICE_NAME=swasthguru-signal-service
      - MAX_PARTICIPANTS=2
      - CORS_ORIGIN=http://localhost:3000
      # Optional TURN server (required for users behind strict NAT)
      # - TURN_SERVER_URL=turn:your-turn-server.com:3478
      # - TURN_USERNAME=your-turn-username
      # - TURN_CREDENTIAL=your-turn-credential
    networks:
      - swasth-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    # Scale signal service for high concurrency
    deploy:
      replicas: 1  # Increase to 3+ in production with sticky sessions
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # ── Core Engine (FastAPI + GenAI) ────────────────────────────────────────────
  core-engine:
    build:
      context: ./core-engine
      dockerfile: Dockerfile
    container_name: swasth-core-engine
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${NEXT_PUBLIC_GEMINI_API_KEY}
    env_file:
      - core-engine/.env
    networks:
      - swasth-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Redis (Session Store + Rate Limiter) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: swasth-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - swasth-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── MongoDB (Legacy — for MongoDB-backed features) ───────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: swasth-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - swasth-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

networks:
  swasth-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local
